<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>
    .dot { fill: #f59e0b; }
  </style>
  <!-- 5-point star outline as dots -->
  <!-- Top point -->
  <circle class="dot" cx="100" cy="20"  r="3.5"/>
  <!-- Upper-right arm -->
  <circle class="dot" cx="115" cy="55"  r="3.5"/>
  <circle class="dot" cx="130" cy="70"  r="3.5"/>
  <!-- Right point -->
  <circle class="dot" cx="170" cy="75"  r="3.5"/>
  <!-- Lower-right inward -->
  <circle class="dot" cx="145" cy="100" r="3.5"/>
  <circle class="dot" cx="140" cy="115" r="3.5"/>
  <!-- Lower-right point -->
  <circle class="dot" cx="155" cy="155" r="3.5"/>
  <!-- Bottom center inward -->
  <circle class="dot" cx="130" cy="135" r="3.5"/>
  <circle class="dot" cx="115" cy="145" r="3.5"/>
  <!-- Bottom point -->
  <circle class="dot" cx="100" cy="175" r="3.5"/>
  <!-- Bottom-left inward -->
  <circle class="dot" cx="85"  cy="145" r="3.5"/>
  <circle class="dot" cx="70"  cy="135" r="3.5"/>
  <!-- Lower-left point -->
  <circle class="dot" cx="45"  cy="155" r="3.5"/>
  <!-- Lower-left arm -->
  <circle class="dot" cx="60"  cy="115" r="3.5"/>
  <circle class="dot" cx="55"  cy="100" r="3.5"/>
  <!-- Left point -->
  <circle class="dot" cx="30"  cy="75"  r="3.5"/>
  <!-- Upper-left arm -->
  <circle class="dot" cx="70"  cy="70"  r="3.5"/>
  <circle class="dot" cx="85"  cy="55"  r="3.5"/>
</svg>
