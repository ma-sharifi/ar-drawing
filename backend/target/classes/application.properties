spring.application.name=ar-drawing-backend
server.port=8080

# H2 in-memory DB (replace with PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:ardrawing
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Base URL where SVG files are served from the classpath /static/templates/
app.templates.base-url=/templates/
