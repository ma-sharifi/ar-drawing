name: ARDrawing
options:
  bundleIdPrefix: com.ardrawing
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO

targets:
  ARDrawing:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ARDrawing
    info:
      path: ARDrawing/Resources/Info.plist
      properties:
        NSCameraUsageDescription: "ARDrawing uses the camera to detect flat surfaces and overlay your chosen drawing template."
        UIRequiredDeviceCapabilities:
          - arkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ardrawing.app
